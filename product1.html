<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON'EA – MARA Studio</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #ccc;
  font-family: 'Abel', sans-serif;
}

/* TITLE */
.product-title {
  text-align: center;
  margin-top: 120px;
  font-size: 1.8rem;
  letter-spacing: 4px;
}

/* MAIN IMAGE */
.main-image img {
  width: 90%;
  max-width: 1000px;
  display: block;
  margin: 40px auto;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 0 40px 100px;
}

.gallery img {
  width: 100%;
}
</style>
</head>

<body>

<div class="product-title">ON'EA</div>

<div class="main-image">
  <img src="mara-studio/sunlounger-main.jpg" alt="">
</div>

<div class="gallery">
  <img src="mara-studio/sunlounger1.jpg">
  <img src="mara-studio/sunlounger2.jpg">
  <img src="mara-studio/sunlounger3.jpg">
  <img src="mara-studio/sunlounger4.jpg">
</div>

</body>
</html>
