<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mariela Ganova Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #ccc;
      font-family: 'Abel', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 1rem 2rem;
      align-items: center;
      z-index: 1000;
     } 
    
    .logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .logo img {
      width: 65%;
      height: auto;
      display: block;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .icons {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .menu-toggle {
  width: 25px;
  height: 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}
    ..menu-toggle span {
  height: 2px;
  background-color: #fff;
  width: 100%;
  display: block;
  transition: all 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.menu-toggle.active span:nth-child(2) {
  opacity: 0;
}

.menu-toggle.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
   
    }
    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .center-text h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: #ccc;
    }
    .menu {
      display: none;
      position: absolute;
      top: 60px;
      right: 2rem;
      background-color: #000;
      border: 1px solid #333;
      padding: 1rem;
      z-index: 999;
    }
    .menu a {
      display: block;
      color: #ccc;
      text-decoration: none;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .menu a:hover {
      color: #fff;
    }
    .social-icons {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
    }
    .social-icons a {
      color: #ccc;
      font-size: 1.2rem;
      text-decoration: none;
    }
    .social-icons a:hover {
      color: #fff;
    }
    .contact-box {
      position: absolute;
      top: 20%;
      right: 2rem;
      color: #ccc;
      text-align: right;
      font-size: 1.1rem;
      line-height: 2.4rem;
    }
    .contact-box h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .divider {
      border-bottom: 1px solid #666;
      margin: 0.5rem 0 1rem;
    }
  </style>
</head>
<body>
 <header>
<a href="index.html" class="logo">
<img src="logo.png" alt="Logo">
</a>
<div class="icons">
<div class="menu-toggle" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>
</div>
  </header>
   <div class="menu" id="menu">
    <a href="index.html">0.1 HOMEPAGE</a>
    <a href="about.html">0.2 ABOUT</a>
    <a href="interiors.html">0.3 INTERIORS</a>
    <a href="exteriors.html">0.4 EXTERIORS</a>
    <a href="mara-studio.html">0.5 MARA studio</a>
    <a href="price.html">0.6 PRICE</a>
    <a href="management.html">0.7 MANAGEMENT & SUPPORT</a>
    <a href="awards-press.html">0.8 AWARDS & PRESS</a>
    <a href="contact.html">0.9 CONTACT</a>
  </div>
  <div class="contact-box">
    <h2>GENERAL CONTACTS:</h2>
    <div class="divider"></div>
    <div><strong>E:</strong><br>m.ganova@mail.bg<br>mariela.ganova@gmail.com</div>
    <div class="divider"></div>
    <div><strong>T:</strong><br>+359897808730 (EU) (BG)</div>
  </div>
   <script>
function toggleMenu() {
  const menu = document.getElementById('menu');
  const toggle = document.querySelector('.menu-toggle');

  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  toggle.classList.toggle('active');
}
</script>
</body>
</html>
