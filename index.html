<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mariela Ganova Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: 'Abel', sans-serif;
  cursor: none;
  background-color: #000;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1; 
  filter: brightness(0.9);
}
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 80px;
  z-index: 1000; 
}
.logo {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background-color: #444;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo img {
  width: 65%;
  height: auto;
}

.menu-toggle {
  width: 25px;
  height: 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  z-index: 1100;
}

.menu-toggle span {
  height: 2px;
  background-color: #fff;
  width: 100%;
  display: block;
  transition: all 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.menu-toggle.active span:nth-child(2) {
  opacity: 0;
}
.menu-toggle.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

.menu {
  display: none;
  position: fixed;
  top: 80px;
  right: 2rem;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid #333;
  padding: 1rem;
  z-index: 1050;
}

.menu a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
  transition: color 0.3s ease;
}

.menu a:hover {
  color: #fff;
}

.overlay {
  position: relative;
  width: 100%;
  height: 100vh;
  color: #ccc;
  z-index: 1;
}

.middle {
  height: calc(100vh - 80px);
  display: flex;
  justify-content: center;
  align-items: center;
}

.center-text {
  text-align: center;
  animation: fadeIn 5s ease forwards;
}

.center-text h1 {
  font-size: 1.8rem;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.bottom {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  animation: fadeIn 5s ease forwards;
  z-index: 2;
}

.social-icons {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.social-icons a {
  color: #ccc;
  font-size: 1.1rem;
  transition: color 0.3s;
}

.social-icons a:hover {
  color: #fff;
}

footer {
  font-size: 0.7rem;
  color: #aaa;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Cursor with logo --- */
.cursor-logo {
  position: fixed;
  top: 0;
  left: 0;
  width: 40px;
  height: 40px;
  pointer-events: none;
  border-radius: 50%;
  overflow: hidden;
  z-index: 2000;
  transform: translate(-50%, -50%);
  backdrop-filter: blur(6px);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 12px rgba(255,255,255,0.08);
  transition: transform 0.12s ease-out;
}

.cursor-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.9;
}

/* --- Mobile --- */
@media (max-width: 900px) {
  body {
    cursor: default;
  }
  .cursor-logo {
    display: none;
  }
  .menu {
    right: 1rem;
  }
  .logo {
    width: 50px;
    height: 50px;
  }
  .center-text h1 {
    font-size: 1.4rem;
  }
  .bottom {
    gap: 5px;
  }
}
</style>
</head>

<body>
<video autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4" />
  Your browser does not support HTML5 video.
</video>

<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="Logo">
  </a>
  <div class="menu-toggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <div class="menu" id="menu">
    <a href="index.html">0.1 HOMEPAGE</a>
    <a href="about.html">0.2 ABOUT</a>
    <a href="interiors.html">0.3 INTERIORS</a>
    <a href="exteriors.html">0.4 EXTERIORS</a>
    <a href="mara-studio.html">0.5 MARA studio</a>
    <a href="price.html">0.6 PRICE</a>
    <a href="management.html">0.7 MANAGEMENT & SUPPORT</a>
    <a href="awards-press.html">0.8 AWARDS & PRESS</a>
    <a href="contact.html">0.9 CONTACT</a>
  </div>
</header>

<div class="overlay">
  <div class="middle">
    <div class="center-text">
      <h1>INTERIOR AND PRODUCT DESIGN STUDIO</h1>
    </div>
  </div>
  <div class="bottom">
    <div class="social-icons">
      <a href="https://instagram.com/marielaganova" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://pinterest.com/ganovamariela" target="_blank"><i class="fab fa-pinterest"></i></a>
      <a href="https://behance.net/marielaganova" target="_blank"><i class="fab fa-behance"></i></a>
    </div>
    <footer>© 2025 Mariela Ganova. All rights reserved</footer>
  </div>
</div>

<!-- Cursor Logo -->
<div class="cursor-logo">
  <img src="logo.png" alt="Cursor Logo">
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById('menu');
  const toggle = document.querySelector('.menu-toggle');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  toggle.classList.toggle('active');
}

// Smooth cursor
const cursor = document.querySelector('.cursor-logo');
let mouseX = 0, mouseY = 0, posX = 0, posY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  posX += (mouseX - posX) * 0.15;
  posY += (mouseY - posY) * 0.15;
  cursor.style.transform = `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
